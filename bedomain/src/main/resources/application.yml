server:
  port: 8080

spring:
  application:
    name: bedomain

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/bedomain?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:bedomain}
    password: ${DB_PASSWORD:bedomain}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/bedomain}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/bedomain/protocol/openid-connect/certs}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 0
      retries: 0
      properties:
        linger.ms: 0
        max.block.ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    kafka:
      enabled: true

logging:
  level:
    root: INFO
    com.bedomain: DEBUG
    org.springframework.security: DEBUG

app:
  javascript:
    max-cpu-time-seconds: 2
    max-statements: 1000
    max-heap-memory-mb: 64
    fail-on-error: true
    policy: CONSTRAINED

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  redoc:
    path: /redoc.html

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql:3306/bedomain?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: bedomain
    password: ${DB_PASSWORD:bedomain123}
  data:
    redis:
      host: redis
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/bedomain
          jwk-set-uri: http://keycloak:8080/realms/bedomain/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: kafka:9092
