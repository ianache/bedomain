version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bedomain-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bedomain
      MYSQL_USER: bedomain
      MYSQL_PASSWORD: bedomain123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bedomain-network

  redis:
    image: redis:7-alpine
    container_name: bedomain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bedomain-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: bedomain-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8180:8080"
    networks:
      - bedomain-network
    volumes:
      - keycloak_data:/opt/keycloak/data

  bedomain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bedomain-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: bedomain
      DB_PASSWORD: bedomain123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/bedomain
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - bedomain-network

  k6:
    image: grafana/k6:latest
    container_name: bedomain-k6
    volumes:
      - ./tests/k6:/scripts
    environment:
      - K6_BASE_URL=http://bedomain:8080
    command: run /scripts/load-test.js
    profiles:
      - none
    networks:
      - bedomain-network

  newman:
    image: postman/newman:latest
    container_name: bedomain-newman
    volumes:
      - ./tests/postman:/etc/newman
    command: run bedomain-api.postman_collection.json
    profiles:
      - none
    networks:
      - bedomain-network

volumes:
  mysql_data:
  redis_data:
  keycloak_data:

networks:
  bedomain-network:
    driver: bridge
