services:
  mysql:
    image: mysql:8.0
    container_name: bedomain-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bedomain
      MYSQL_USER: bedomain
      MYSQL_PASSWORD: bedomain123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bedomain-network

  redis:
    image: redis:7-alpine
    container_name: bedomain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bedomain-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: bedomain-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - bedomain-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: bedomain-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
      KEYCLOAK_IMPORT: /opt/keycloak/data/realm-export.json
    ports:
      - "8180:8080"
    networks:
      - bedomain-network
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./realm-export.json:/opt/keycloak/data/realm-export.json:ro

  bedomain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bedomain-app
    ports:
      - "8080:8080"
    environment:
      #SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: bedomain
      DB_PASSWORD: bedomain123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      #KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/microservicios
      #KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/microservicios/protocol/openid-connect/certs
      KEYCLOAK_ISSUER_URI: http://192.168.56.101:8180/realms/microservicios
      KEYCLOAK_JWK_SET_URI: http://192.168.56.101:8180/realms/microservicios/protocol/openid-connect/certs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - bedomain-network

  k6:
    image: grafana/k6:latest
    container_name: bedomain-k6
    volumes:
      - ./tests/k6:/scripts
    environment:
      - K6_BASE_URL=http://bedomain:8080
    command: run /scripts/load-test.js
    profiles:
      - none
    networks:
      - bedomain-network

  newman:
    image: postman/newman:latest
    container_name: bedomain-newman
    volumes:
      - ./tests/postman:/etc/newman
    command: run bedomain-api.postman_collection.json
    profiles:
      - none
    networks:
      - bedomain-network

volumes:
  mysql_data:
  redis_data:
  keycloak_data:
  kafka_data:

networks:
  bedomain-network:
    driver: bridge
